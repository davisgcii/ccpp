# Default Configuration for CC++ PII Masking System
#
# This file defines the default settings for the streaming PII masking system.
# You can override these settings by creating environment-specific configs
# (e.g., dev.yaml, prod.yaml) or by passing config dicts at runtime.

# Stage 1: Fast Risk Router (Logit-based classifier with TRUE logit extraction)
stage1:
  # Backend selection: "mlx" (default, Apple Silicon), "ollama" (cross-platform), "anthropic", "openai"
  #
  # MLX (default): Apple Silicon only, uses sequence log-likelihood
  #   - Pros: Calibrated probabilities, works offline
  #   - Cons: Requires Apple Silicon, ~1-2s per classification
  #   - Model: "Qwen/Qwen3-1.7B-MLX-8bit" or "mlx-community/Qwen3-0.6B-4bit"
  #   - Requires: sequence_loglikelihood.enabled: true
  #
  # Ollama: Cross-platform, uses native logprobs API
  #   - Pros: Works on any OS, potentially faster (~0.1-0.3s)
  #   - Cons: Small models (0.6b) may have accuracy issues, requires Ollama running
  #   - Model: "qwen3:0.6b" (fast) or "qwen3:1.7b" (better accuracy)
  #   - Requires: sequence_loglikelihood.enabled: false, add think=False to API calls
  #
  backend: mlx  # Default: MLX for calibrated probabilities

  # Model configuration
  # MLX models: "Qwen/Qwen3-1.7B-MLX-8bit", "mlx-community/Qwen3-0.6B-4bit"
  # Ollama models: "qwen3:0.6b", "qwen3:1.7b"
  #
  # Using 0.6B-4bit for Stage 1: ~40% faster classification (~1s vs ~2s)
  # Stage 1 only needs SAFE/FAIL classification, smaller model is sufficient
  model_name: mlx-community/Qwen3-0.6B-4bit  # Faster model for Stage 1
  # model_name: Qwen/Qwen3-1.7B-MLX-8bit  # More accurate but slower
  # model_name: qwen3:0.6b  # Uncomment for Ollama backend
  quantized: true  # Only used by MLX backend

  # LoRA adapter path (set after training Stage 1 adapter)
  adapter_path: models/adapters/stage1/qwen3-0.6b-pii-classifier

  # Generation settings
  timeout: 60  # seconds
  max_tokens: 3  # Only need "SAFE" or "FAIL"

  # Qwen3 recommended settings for non-thinking mode (from Qwen3 docs):
  # Temperature=0.7, TopP=0.8, TopK=20, MinP=0
  # Note: For classification (logprobs extraction), we use temperature=0
  # for deterministic output, but keep top_k=20 to ensure SAFE/FAIL are in top tokens.
  temperature: 0.7  # Qwen3 non-thinking recommendation
  top_p: 0.8        # Qwen3 non-thinking recommendation
  top_k: 20         # Qwen3 non-thinking recommendation
  min_p: 0.0        # Qwen3 non-thinking recommendation
  do_sample: true
  enable_thinking: false  # Must be false for classification

  # Logit extraction tokens
  # IMPORTANT: Both must be single tokens in Qwen3 vocabulary
  # RISK is multi-token [R, ISK] so we use FAIL instead
  logit_extraction:
    token_a: SAFE
    token_b: FAIL

  # Optional logit calibration to counter baseline bias in base models
  calibration:
    enabled: false
    context: []
    current_buffer: "Hello there."

  # Diagnostic prompt mode for Stage 1
  # full: use full template (default)
  # minimal: use a short instruction prompt
  # both: log deltas for full vs minimal (uses full for scoring)
  #
  # NOTE: "both" runs a SECOND full forward pass per classification purely to
  # log a diagnostic delta that does not affect the score, ~2x Stage 1 latency.
  # Keep this "full" in normal operation; only switch to "both"/"minimal" when
  # actively debugging prompt calibration.
  diagnostic_prompt_mode: full

  # Sequence log-likelihood scoring for SAFE vs FAIL
  # This computes P(prompt + "SAFE") vs P(prompt + "FAIL") as full sequences
  # Bypasses the <think> token bias issue in Qwen3
  #
  # MLX backend: MUST be enabled (true) - MLX uses this for calibrated probabilities
  # Ollama backend: MUST be disabled (false) - Ollama uses native logprobs API instead
  sequence_loglikelihood:
    enabled: true  # Set to true for MLX, false for Ollama

  # Prompt template mode: single template with placeholders
  # Placeholders: {context}, {current_buffer}
  # The template is the ENTIRE prompt - you control everything
  #
  # Formatted with markdown similar to Stage 2, with few-shot examples
  # showing realistic conversation contexts
  prompt_template: |
    # Role
    You are a **PII classifier** for **STREAMING text**.

    # Task
    Classify the **CURRENT BUFFER** as `SAFE` or `FAIL`.

    - Output must be **exactly one token**: `SAFE` or `FAIL`
    - Decide **only from what is in the buffer right now**, using the provided context.
    - Do **not** guess what the user will type next beyond what the buffer already shows.

    ---

    # Decision Rules

    ## FAIL if ANY are true

    ### A) Actual PII is present in the buffer
    Fail if the buffer contains any of the following **as actual data** (including common obfuscations):

    - **Email** (including “name at domain dot com”)
    - **Phone** numbers (any phone-like pattern; typically 7+ digits; may include country code)
    - **Street/shipping address** (house number + street name; unit/apt; ZIP)
    - **Government IDs**: SSN, passport, driver’s license, national IDs
    - **Financial**: credit card numbers, bank account/routing numbers, IBAN/SWIFT
    - **Credentials/secrets**: passwords, OTPs/recovery codes
    - **Keys/tokens**: API keys, auth tokens (Bearer/JWT), session cookies, private keys, seed phrases
    - **Order/account identifiers**: order numbers, tracking numbers, confirmation codes, account IDs when provided
    - **Network/device identifiers**: IP addresses, MAC addresses, device IDs/serials

    ### B) Partial PII is present (streaming fragment)
    Fail if the buffer contains a **fragment** that looks like the start of PII, such as:
    - `(415) 555-`
    - `nina.park@`
    - `118 Lost`
    - `4242 4242 4242`
    - `000-12-`
    - `Bearer eyJhbGciOi`

    ### C) Imminent PII due to context
    Fail if:
    1) The user buffer looks like they are **about to provide it** (even if the actual PII isn’t visible yet)., **especially if**
    2) The context contains discussion about PII or requests for PII

    **Imminent lead-ins** (case-insensitive; may include punctuation):
    - `my email is`, `email is`, `it's under the email`
    - `my phone is`, `my number`, `number is`
    - `my address is`, `ship to`, `deliver to`, `it was shipped to`
    - `order is`, `order number is`, `tracking is`, `account id is`
    - `password is`, `otp is`, `code is`, `token is`, `api key is`

    **Important:** Imminent-PII FAIL does not require the context to contain discussion of PII if the lead-in is explicit, e.g. "my email is".

    ---

    ## SAFE otherwise
    If none of the FAIL conditions apply, classify as `SAFE`.

    ---

    # Examples

    ## Section 1 — Clear SAFE

    **EXAMPLE 1**  
    Context: (No prior context)  
    Buffer: hi — can you help me?  
    Answer: SAFE  
    Reasoning: Generic help request; no identifiers or imminent PII.

    **EXAMPLE 2**  
    Context: (No prior context)  
    Buffer: my package is late and i’m frustrated  
    Answer: SAFE  
    Reasoning: Complaint; no identifying data.

    **EXAMPLE 3**  
    Context: (No prior context)  
    Buffer: i live in ohio  
    Answer: SAFE  
    Reasoning: State-level location only; no street address.

    **EXAMPLE 4**  
    Context:  
    User: i need help with a return  
    Assistant: what seems to be the issue?  
    Buffer: it’s missing a button  
    Answer: SAFE  
    Reasoning: “it’s” refers to the product issue; assistant did not ask for PII.

    **EXAMPLE 5**  
    Context:  
    User: can you tell me your store hours?  
    Assistant: sure — what city are you in?  
    Buffer: columbus  
    Answer: SAFE  
    Reasoning: City only; not a street address.

    **EXAMPLE 6**  
    Context:  
    User: i can’t log in  
    Assistant: i can help troubleshoot. what error do you see?  
    Buffer: it says invalid password  
    Answer: SAFE  
    Reasoning: Mentions password conceptually, but no password value.

    **EXAMPLE 7**  
    Context:  
    User: what carriers do you ship with?  
    Assistant: we use ups/usps/fedex depending on region.  
    Buffer: thanks!  
    Answer: SAFE  
    Reasoning: No PII.

    **EXAMPLE 8**  
    Context:  
    User: i think i was charged twice  
    Assistant: can you tell me the date of the charge?  
    Buffer: january 3rd  
    Answer: SAFE  
    Reasoning: Date alone is not an identifier.

    **EXAMPLE 9**  
    Context:  
    User: where are you located?  
    Assistant: we have stores in several states.  
    Buffer: do you have one in nevada?  
    Answer: SAFE  
    Reasoning: General location question; no PII.

    **EXAMPLE 10**  
    Context:  
    User: my email is [PII/EMAIL]  
    Assistant: thanks — how else can i help?  
    Buffer: actually nevermind, i found it  
    Answer: SAFE  
    Reasoning: Buffer contains no new PII; masked placeholders in context do not count as PII in the current buffer.

    ---

    ## Section 2 — Clear FAIL

    **EXAMPLE 11**  
    Context: (No prior context)  
    Buffer: nina.park@example.com  
    Answer: FAIL  
    Reasoning: Contains an email address.

    **EXAMPLE 12**  
    Context: (No prior context)  
    Buffer: call me at (415) 555-0147  
    Answer: FAIL  
    Reasoning: Contains a phone number.

    **EXAMPLE 13**  
    Context: (No prior context)  
    Buffer: ship to 118 Lost Planton Rd Apt 4C  
    Answer: FAIL  
    Reasoning: Contains a street address.

    **EXAMPLE 14**  
    Context: (No prior context)  
    Buffer: my ssn is 000-12-3456  
    Answer: FAIL  
    Reasoning: Contains SSN-like identifier.

    **EXAMPLE 15**  
    Context: (No prior context)  
    Buffer: it's 4242 4242 4242 4242 exp 10/30  
    Answer: FAIL  
    Reasoning: Contains a credit card number.

    **EXAMPLE 16**  
    Context: (No prior context)  
    Buffer: Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...  
    Answer: FAIL  
    Reasoning: Contains an auth token fragment.

    **EXAMPLE 17**  
    Context: (No prior context)  
    Buffer: api key sk_live_TEST_9f3c2a1b77d84c2aa0c9  
    Answer: FAIL  
    Reasoning: API key present.

    **EXAMPLE 18**  
    Context: (No prior context)  
    Buffer: tracking 1Z999AA10123456784  
    Answer: FAIL  
    Reasoning: Tracking number / identifier present.

    **EXAMPLE 19**  
    Context: (No prior context)  
    Buffer: my ip is 203.0.113.42  
    Answer: FAIL  
    Reasoning: IP address is an identifier.

    **EXAMPLE 20**  
    Context:  
    User: i need help finding my order  
    Assistant: what’s the email on the order?  
    Buffer: it’s  
    Answer: FAIL  
    Reasoning: Assistant asked for email; “it’s” is an imminent-PII lead-in.

    ---

    ## Section 3 — Ambiguous (still labeled)

    **EXAMPLE 21**  
    Context:  
    User: i need help finding my order  
    Assistant: what’s the email on the order?  
    Buffer: my  
    Answer: FAIL  
    Reasoning: No email value yet, but this is an imminent-PII lead-in to a requested email.

    **EXAMPLE 22**  
    Context:  
    User: i need help  
    Assistant: what’s your phone number?  
    Buffer: sure it's 
    Answer: FAIL  
    Reasoning: After a phone-number request, “sure it's” is a strong imminent-PII lead-in.

    **EXAMPLE 23**  
    Context:  
    User: i need help with shipping  
    Assistant: what’s the delivery address?  
    Buffer: 118  
    Answer: FAIL  
    Reasoning: After an address request, even a partial number is likely the start of an address.

    **EXAMPLE 24**  
    Context:  
    User: my order never arrived  
    Assistant: can you share your order number?  
    Buffer: what is your refund 
    Answer: SAFE  
    Reasoning: Despite discussion of PII in context, user is not providing or showing imminent mention of PII.

    **EXAMPLE 25**  
    Context: (No prior context)  
    Buffer: my email is  
    Answer: FAIL  
    Reasoning: Despite no discussion of PII in context, user is providing an imminent-PII lead-in.

    **EXAMPLE 26**  
    Context: (No prior context)  
    Buffer: it’s  
    Answer: SAFE  
    Reasoning: Too generic without PII request context.

    **EXAMPLE 27**  
    Context:  
    User: i can’t log in  
    Assistant: what’s your email?  
    Buffer: nina
    Answer: FAIL  
    Reasoning: Partial email fragment.

    **EXAMPLE 28**  
    Context:  
    User: can you help me?  
    Assistant: what’s your order number?  
    Buffer: 5839  
    Answer: FAIL  
    Reasoning: Identifier fragment in response to request; treat as partial PII.

    **EXAMPLE 29**  
    Context:  
    User: where is my package?  
    Assistant: what’s your tracking number?  
    Buffer: it’s not here  
    Answer: SAFE  
    Reasoning: Despite “it’s”, buffer clearly expresses a complaint, not an identifier.

    **EXAMPLE 30**  
    Context:  
    User: i was charged twice  
    Assistant: can you paste the card number so i can check?  
    Buffer: i don’t feel comfortable sharing that  
    Answer: SAFE  
    Reasoning: User refuses; no PII present.

    ---

    # Now classify

    Context:
    {context}

    Buffer:
    {current_buffer}

    Answer:

# Stage 2: Accurate Entity Redactor (Span extraction model)
stage2:
  # Backend selection: "mlx" (default, Apple Silicon), "ollama" (cross-platform), "anthropic", "openai"
  #
  # MLX: Apple Silicon only, text generation for entity extraction
  # Ollama: Cross-platform, text generation with think=False
  #
  backend: mlx  # Default: MLX for consistent local inference
  # backend: ollama  # Uncomment for Ollama backend

  # Model configuration - Use larger model for entity extraction
  # MLX models: "Qwen/Qwen3-1.7B-MLX-8bit"
  # Ollama models: "qwen3:1.7b"
  model_name: Qwen/Qwen3-1.7B-MLX-8bit  # MLX model for entity extraction
  # model_name: qwen3:1.7b  # Uncomment for Ollama backend
  quantized: true  # Only used by MLX backend

  # LoRA adapter path (set after training Stage 2 adapter)
  adapter_path: models/adapters/stage2/qwen3-1.7b-pii-redactor

  # Generation settings
  timeout: 120  # seconds
  max_tokens: 200  # Enough for multiple entity extractions

  # Qwen3 recommended settings for non-thinking mode (from Qwen3 docs):
  # Temperature=0.7, TopP=0.8, TopK=20, MinP=0
  # These settings provide good generation quality without thinking mode.
  temperature: 0.7  # Qwen3 non-thinking recommendation
  top_p: 0.8        # Qwen3 non-thinking recommendation
  top_k: 20         # Qwen3 non-thinking recommendation
  min_p: 0.0        # Qwen3 non-thinking recommendation
  do_sample: true
  enable_thinking: false  # Must be false for entity extraction

  # Prompt template for Stage 2 (entity extraction)
  # Categories must match training data: person, contact, gov_id, identifier,
  # location, financial, credentials, medical
  prompt_template: |
    # Instructions

    You are a PII (Personally Identifiable Information) entity extractor for streaming text.

    Your task: Extract all PII entities from the WINDOW TEXT.

    CRITICAL: Use conversation context to understand what entities are, but ONLY extract entities
    from the window text itself. Historical PII should NOT be extracted again.

    ## PII Categories

    - person: Human names (first, last, full). Examples: "Marcus Chen", "Priya", "Dr. Sarah Williams"
    - contact: Email addresses, phone numbers. Examples: "john.smith@gmail.com", "628-447-8291"
    - gov_id: SSN, driver's license, passport numbers, dates of birth. Examples: "512-83-4709", "March 15th, 1989"
    - identifier: Order numbers, account IDs, tracking numbers. Examples: "WMT-29847531", "REF-247981"
    - location: Physical addresses, coordinates. Examples: "4817 Wilshire Boulevard Unit 302"
    - financial: Credit cards, bank accounts, routing numbers. Examples: "4916-2847-3921-0058"
    - credentials: Passwords, API keys, tokens. Examples: "sk_live_abc123", "MyP@ssw0rd!"
    - medical: Medical record numbers, diagnoses, prescriptions. Examples: "MRN 294783", "Lisinopril"

    ## NOT PII (do not extract)

    - Generic text without identifiers
    - Mentions of PII categories ("my email", "phone number") without actual data
    - Placeholder examples (example.com, 555-1234, test@test.com)
    - Common first names alone UNLESS in response to identity request
    - City/state/country names (NOT precise location)
    - General questions, help requests, product inquiries

    ## Output Format

    - If no PII: PASS
    - If PII found: MASK "entity_text" category
    - Multiple entities: MASK "entity1" cat1; MASK "entity2" cat2

    ---

    # Examples

    ## Example 1
    Context: (No prior context)
    Window text: You can reach me at john.doe@gmail.com
    Output: MASK "john.doe@gmail.com" contact

    ## Example 2
    Context: (No prior context)
    Window text: Hi, how can I help you today?
    Output: PASS

    ## Example 3
    Context:
    Assistant: What's your contact number?
    Window text: 702-555-0147
    Output: MASK "702-555-0147" contact

    ## Example 4
    Context: (No prior context)
    Window text: Here's my key: sk_live_4eC39HqLyjWDarjtT1zdp7dc
    Output: MASK "sk_live_4eC39HqLyjWDarjtT1zdp7dc" credentials

    ## Example 5
    Context:
    Assistant: Can you provide your name?
    Window text: it's Marcus Chen
    Output: MASK "Marcus Chen" person

    ## Example 6
    Context: (No prior context)
    Window text: Contact me: john@email.com or 555-123-4567
    Output: MASK "john@email.com" contact; MASK "555-123-4567" contact

    ## Example 7
    Context:
    User: I need to return something
    Window text: where is your store in Las Vegas?
    Output: PASS

    ## Example 8
    Context: (No prior context)
    Window text: my order number is WMT-29847531
    Output: MASK "WMT-29847531" identifier

    ---

    # Current Request

    Context:
    {context}

    Window text:
    {window_text}

    Output:

# Streaming Configuration
streaming:
  # Stream break detection
  stream_break_timeout_ms: 2000  # Time since last token to trigger masking decision (2s for voice pauses)

  # Buffer settings
  holdback_buffer_size: 2048  # Max chars before forcing decision (safety net for very long continuous speech)
  overlap_chars: 128  # Chars to retain for cross-utterance detection

  # EMA (Exponential Moving Average) settings
  ema_beta: 0.85  # Smoothing factor (higher = more smoothing)
  reset_ema_on_stream_break: false  # Allow cross-break detection

  # Hysteresis thresholds
  t_high: 0.4  # EMA threshold to escalate to Stage 2
  t_low: 0.2   # EMA threshold to de-escalate

  # Risk detection threshold
  risk_threshold: 0.7  # Individual token P(RISK) to set any_risk_in_buffer

# Fast Heuristics (Pre-Stage-1 patterns)
heuristics:
  # Enable fast regex-based detection
  enabled: true

  # Confidence threshold for direct Stage 2 escalation
  strong_match_confidence: 0.9

  # Pattern-specific settings (optional overrides)
  patterns:
    email:
      enabled: true
      confidence: 1.0
    phone:
      enabled: true
      confidence: 0.95
    ssn:
      enabled: true
      confidence: 1.0
    credit_card:
      enabled: true
      confidence: 0.95  # Luhn check adds confidence
    aws_key:
      enabled: true
      confidence: 1.0
    stripe_key:
      enabled: true
      confidence: 1.0
    github_token:
      enabled: true
      confidence: 1.0
    pem_key:
      enabled: true
      confidence: 1.0

# Allowlist Configuration
allowlist:
  # Example domains/patterns that are safe (e.g., docs)
  email_domains:
    - example.com
    - test.com
    - localhost

  # Test API keys that should not be flagged
  test_api_keys:
    - sk_test_  # Stripe test keys
    - pk_test_  # Stripe public test keys

# Masking Output Configuration
#
# Honored by every masking call site (Stage 2 output, GUI send path, and the
# review panel + preview), which all route through ccpp.types.mask_text.
masking:
  # Default mask format. Placeholder may be {category} or {type}; both resolve
  # to the upper-cased category name (e.g., [IDENTIFIER]).
  default_format: "[{category}]"

  # Category-specific formats (optional; override default_format).
  # Literal replacement strings, not templates.
  # Categories match training data: person, contact, gov_id, identifier,
  # location, financial, credentials, medical
  category_formats:
    person: "[PERSON]"
    contact: "[CONTACT]"
    gov_id: "[GOV_ID]"
    identifier: "[IDENTIFIER]"
    location: "[LOCATION]"
    financial: "[FINANCIAL]"
    credentials: "[CREDENTIALS]"
    medical: "[MEDICAL]"

  # Case sensitivity for entity matching. false = stricter redaction (mask
  # regardless of case) at the risk of masking look-alike words.
  # Note: name-like entities (person) always match on word boundaries so a short
  # name is not masked inside a larger word; entities with punctuation/digits
  # (emails, phones, cards, keys) always match as exact substrings.
  case_sensitive: true

# Logging and Monitoring
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  # Note: Use DEBUG for development, INFO for production
  level: INFO

  # Enable TRACE level (below DEBUG) for ultra-verbose logging
  # Useful for debugging timer tick issues and race conditions
  # Warning: Very verbose - produces ~100+ lines per classification
  trace_enabled: false

  # Log file path (set to null to disable file logging)
  log_file: /tmp/gui_debug.log

  # Suppress verbose third-party loggers (httpx, httpcore, anthropic)
  suppress_httpx: true

  # Use structured format with logger names (useful for filtering)
  structured: false

  # Legacy options (kept for compatibility)
  log_decisions: true  # Log masking decisions
  log_latency: true  # Log per-token latency

# Performance Settings
performance:
  # Batch processing (future)
  batch_size: 1  # Currently 1 (streaming per-token)

  # Parallelization (future)
  parallel_stage1: false  # Run Stage 1 in parallel for multiple tokens

  # Cache settings (future)
  cache_stage1_results: false  # Cache identical context+buffer combinations
