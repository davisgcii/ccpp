# Default Configuration for CC++ PII Masking System
#
# This file defines the default settings for the streaming PII masking system.
# You can override these settings by creating environment-specific configs
# (e.g., dev.yaml, prod.yaml) or by passing config dicts at runtime.

# Stage 1: Fast Risk Router (Logit-based classifier with TRUE logit extraction)
stage1:
  # Backend selection: "ollama" (default), "mlx" (Apple Silicon), "anthropic", "openai"
  # - ollama: Cross-platform, uses native logprobs API for calibrated probabilities
  # - mlx: Apple Silicon only, uses sequence log-likelihood (slower but accurate)
  backend: ollama  # Default: Ollama with native logprobs

  # Model configuration
  # Ollama: "qwen3:0.6b" (fast) | "qwen3:1.7b" (better accuracy)
  # Note: Use think=False to disable thinking mode for classification
  # MLX: "mlx-community/Qwen3-0.6B-4bit" or "Qwen/Qwen3-1.7B-MLX-8bit"
  model_name: qwen3:0.6b  # Fast model for Stage 1 classification
  quantized: true  # Only used by MLX backend

  # Generation settings
  timeout: 60  # seconds
  max_tokens: 3  # Only need "SAFE" or "FAIL"

  # Qwen3 recommended settings for non-thinking mode (from Qwen3 docs):
  # Temperature=0.7, TopP=0.8, TopK=20, MinP=0
  # Note: For classification (logprobs extraction), we use temperature=0
  # for deterministic output, but keep top_k=20 to ensure SAFE/FAIL are in top tokens.
  temperature: 0.7  # Qwen3 non-thinking recommendation
  top_p: 0.8        # Qwen3 non-thinking recommendation
  top_k: 20         # Qwen3 non-thinking recommendation
  min_p: 0.0        # Qwen3 non-thinking recommendation
  do_sample: true
  enable_thinking: false  # Must be false for classification

  # Logit extraction tokens
  # IMPORTANT: Both must be single tokens in Qwen3 vocabulary
  # RISK is multi-token [R, ISK] so we use FAIL instead
  logit_extraction:
    token_a: SAFE
    token_b: FAIL

  # Optional logit calibration to counter baseline bias in base models
  calibration:
    enabled: false
    context: []
    current_buffer: "Hello there."

  # Diagnostic prompt mode for Stage 1
  # full: use full template (default)
  # minimal: use a short instruction prompt
  # both: log deltas for full vs minimal (uses full for scoring)
  diagnostic_prompt_mode: both

  # Sequence log-likelihood scoring for SAFE vs FAIL
  # This computes P(prompt + "SAFE") vs P(prompt + "FAIL") as full sequences
  # Bypasses the <think> token bias issue in Qwen3
  # NOTE: Only needed for MLX backend. Ollama uses native logprobs (faster).
  sequence_loglikelihood:
    enabled: false  # Disable for Ollama; set to true if using MLX backend

  # Prompt template mode: single template with placeholders
  # Placeholders: {context}, {current_buffer}
  # The template is the ENTIRE prompt - you control everything
  #
  # Formatted with markdown similar to Stage 2, with few-shot examples
  # showing realistic conversation contexts
  prompt_template: |
    # Instructions

    You are a PII classifier for streaming text. Classify the buffer as SAFE or FAIL.

    ## FAIL - Classify as FAIL if ANY of these are true:
    - Buffer contains actual PII: email, phone, SSN, address, API key, order/account numbers (any 5+ digit number in response to a request for identifying information)
    - Buffer contains partial PII (e.g., "555-12" is start of phone number, "1830" could be start of order number)
    - User is clearly about to provide PII: assistant asked for PII AND user has started responding with phrases like "my email is", "my order number is", "it's", "sure, it's", "my phone is"
    - Buffer contains PII AND user is still typing (e.g., "my email is john@gmail.com and")

    ## SAFE - Classify as SAFE only if:
    - Buffer is a greeting, question, or general help request
    - Buffer does not contain actual PII data
    - User redirects or asks a different question instead of providing requested PII

    ---

    # Examples

    ## Example 1
    Context: (No prior context)
    Buffer: hi there, can you help me find my order?

    Answer: SAFE

    ## Example 2
    Context:
    User: I need help
    Assistant: What's your order number?
    Buffer: my order number is

    Answer: FAIL

    ## Example 3
    Context:
    User: I need help
    Assistant: What's your order number?
    Buffer: 1830583

    Answer: FAIL

    ## Example 4
    Context:
    User: I need help
    Assistant: What's your order number?
    Buffer: my order number is 1830583

    Answer: FAIL

    ## Example 5
    Context:
    User: I need help
    Assistant: What's your order number?
    Buffer: my order number is 1830583 and my email is

    Answer: FAIL

    ## Example 6
    Context:
    User: hi there?
    Assistant: What's your email address?
    Buffer: it's

    Answer: FAIL

    ## Example 7
    Context:
    User: hi there?
    Assistant: What's your email address?
    Buffer: john@gmail.com

    Answer: FAIL

    ## Example 8
    Context:
    User: I have a question
    Assistant: What's your question?
    Buffer: where is your store in Las Vegas?

    Answer: SAFE

    ## Example 9
    Context:
    User: hi
    Assistant: What's your phone number?
    Buffer: 555-12

    Answer: FAIL

    ## Example 10
    Context:
    User: I bought a jacket last week
    Assistant: What's your email so I can look up the order?
    Buffer: actually, can I just

    Answer: SAFE

    ## Example 11
    Context: (No prior context)
    Assistant: How can I help you today?
    Buffer: how long does shipping take?

    Answer: SAFE

    ## Example 12
    Context: (No prior context)
    Buffer: i need

    Answer: SAFE

    ---

    # Your Turn

    Context:
    {context}

    Buffer:
    {current_buffer}

    Answer:

# Stage 2: Accurate Entity Redactor (Span extraction model)
stage2:
  # Backend selection: "ollama" (default), "mlx" (Apple Silicon), "anthropic", "openai"
  backend: ollama  # Default: Ollama for consistent local inference

  # Model configuration - Use larger model for entity extraction
  # Ollama: "qwen3:1.7b" | MLX: "Qwen/Qwen3-1.7B-MLX-8bit"
  model_name: qwen3:1.7b  # Larger model for accurate entity extraction
  quantized: true  # Only used by MLX backend

  # Generation settings
  timeout: 120  # seconds
  max_tokens: 200  # Enough for multiple entity extractions

  # Qwen3 recommended settings for non-thinking mode (from Qwen3 docs):
  # Temperature=0.7, TopP=0.8, TopK=20, MinP=0
  # These settings provide good generation quality without thinking mode.
  temperature: 0.7  # Qwen3 non-thinking recommendation
  top_p: 0.8        # Qwen3 non-thinking recommendation
  top_k: 20         # Qwen3 non-thinking recommendation
  min_p: 0.0        # Qwen3 non-thinking recommendation
  do_sample: true
  enable_thinking: false  # Must be false for entity extraction

  # Prompt template for Stage 2 (entity extraction)
  prompt_template: |
    # Instructions

    You are a PII (Personally Identifiable Information) entity extractor for streaming text.

    Your task: Extract all PII entities from the WINDOW TEXT.

    CRITICAL: Use conversation context to understand what entities are, but ONLY extract entities
    from the window text itself. Historical PII should NOT be extracted again.

    ## PII Categories

    - pii/direct: email, phone, address, full name (as identifier), SSN, DOB+identifiers
    - pii/indirect: partial identifiers, demographic combos that enable re-identification
    - credentials: API keys, passwords, tokens, private keys, certificates
    - financial: credit card, account numbers, routing numbers, tax IDs
    - medical: diagnoses, prescriptions, lab results, medical record numbers
    - location/precise: exact addresses (with street number), coordinates, real-time location

    ## NOT PII (do not extract)

    - Generic text without identifiers
    - Mentions of PII categories ("my email", "phone number") without actual data
    - Placeholder examples (example.com, 555-1234, test@test.com)
    - Common first names alone UNLESS in response to identity request
    - City/state/country names (NOT precise location)
    - General questions, help requests, product inquiries

    ## Output Format

    - If no PII: PASS
    - If PII found: MASK "entity_text" category
    - Multiple entities: MASK "entity1" cat1; MASK "entity2" cat2

    ---

    # Examples

    ## Example 1
    Context: (No prior context)
    Window text: You can reach me at john.doe@gmail.com
    Output: MASK "john.doe@gmail.com" pii/direct

    ## Example 2
    Context: (No prior context)
    Window text: Hi, how can I help you today?
    Output: PASS

    ## Example 3
    Context:
    Assistant: What's your contact number?
    Window text: 702-555-0147
    Output: MASK "702-555-0147" pii/direct

    ## Example 4
    Context: (No prior context)
    Window text: Here's my key: sk_live_4eC39HqLyjWDarjtT1zdp7dc
    Output: MASK "sk_live_4eC39HqLyjWDarjtT1zdp7dc" credentials

    ## Example 5
    Context:
    Assistant: Can you provide your email address?
    Window text: it's george
    Output: MASK "george" pii/direct

    ## Example 6
    Context: (No prior context)
    Window text: Contact me: john@email.com or 555-123-4567
    Output: MASK "john@email.com" pii/direct; MASK "555-123-4567" pii/direct

    ## Example 7
    Context:
    User: I need to return something
    Window text: where is your store in Las Vegas?
    Output: PASS

    ## Example 8
    Context: (No prior context)
    Window text: do you know where I can check my order status?
    Output: PASS

    ---

    # Current Request

    Context:
    {context}

    Window text:
    {window_text}

    Output:

# Streaming Configuration
streaming:
  # Stream break detection
  stream_break_timeout_ms: 2000  # Time since last token to trigger masking decision (2s for voice pauses)

  # Buffer settings
  holdback_buffer_size: 2048  # Max chars before forcing decision (safety net for very long continuous speech)
  overlap_chars: 128  # Chars to retain for cross-utterance detection

  # EMA (Exponential Moving Average) settings
  ema_beta: 0.85  # Smoothing factor (higher = more smoothing)
  reset_ema_on_stream_break: false  # Allow cross-break detection

  # Hysteresis thresholds
  t_high: 0.6  # EMA threshold to escalate to Stage 2
  t_low: 0.3   # EMA threshold to de-escalate

  # Risk detection threshold
  risk_threshold: 0.7  # Individual token P(RISK) to set any_risk_in_buffer

# Fast Heuristics (Pre-Stage-1 patterns)
heuristics:
  # Enable fast regex-based detection
  enabled: true

  # Confidence threshold for direct Stage 2 escalation
  strong_match_confidence: 0.9

  # Pattern-specific settings (optional overrides)
  patterns:
    email:
      enabled: true
      confidence: 1.0
    phone:
      enabled: true
      confidence: 0.95
    ssn:
      enabled: true
      confidence: 1.0
    credit_card:
      enabled: true
      confidence: 0.95  # Luhn check adds confidence
    aws_key:
      enabled: true
      confidence: 1.0
    stripe_key:
      enabled: true
      confidence: 1.0
    github_token:
      enabled: true
      confidence: 1.0
    pem_key:
      enabled: true
      confidence: 1.0

# Allowlist Configuration
allowlist:
  # Example domains/patterns that are safe (e.g., docs)
  email_domains:
    - example.com
    - test.com
    - localhost

  # Test API keys that should not be flagged
  test_api_keys:
    - sk_test_  # Stripe test keys
    - pk_test_  # Stripe public test keys

# Masking Output Configuration
masking:
  # Default mask format
  default_format: "[{category}]"  # e.g., [PII/DIRECT]

  # Category-specific formats (optional)
  category_formats:
    pii/direct: "[PII/DIRECT]"
    pii/indirect: "[PII/INDIRECT]"
    credentials: "[CREDENTIALS]"
    financial: "[FINANCIAL]"
    medical: "[MEDICAL]"
    location/precise: "[LOCATION]"

  # Case sensitivity for entity matching
  case_sensitive: true

# Logging and Monitoring
logging:
  level: INFO  # DEBUG, INFO, WARNING, ERROR
  log_decisions: true  # Log masking decisions
  log_latency: true  # Log per-token latency

# Performance Settings
performance:
  # Batch processing (future)
  batch_size: 1  # Currently 1 (streaming per-token)

  # Parallelization (future)
  parallel_stage1: false  # Run Stage 1 in parallel for multiple tokens

  # Cache settings (future)
  cache_stage1_results: false  # Cache identical context+buffer combinations
