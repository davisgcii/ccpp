# LoRA Training Config for Stage 1: PII Risk Classifier
#
# Trains a LoRA adapter on Qwen3-0.6B for SAFE/FAIL classification
#
# Usage:
#   uv run python -m mlx_lm.lora --config configs/lora_stage1.yaml

# Base model (4-bit quantized for memory efficiency)
model: mlx-community/Qwen3-0.6B-4bit

# Training data directory (must contain train.jsonl and valid.jsonl)
data: data/training/stage1_mlx

# Output adapter path
adapter_path: models/adapters/stage1/qwen3-0.6b-pii-classifier

# Training
train: true
iters: 1000
batch_size: 1  # Reduced for memory with long sequences
val_batches: 25
steps_per_eval: 100
steps_per_report: 10
save_every: 200
max_seq_length: 4096  # System prompt is long, need extra context
grad_checkpoint: true  # Save memory

# LoRA hyperparameters
# Applied to last 8 layers (0.6B model is small)
num_layers: 8
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05

# Learning rate with cosine decay
learning_rate: 1e-4
lr_schedule:
  name: cosine_decay
  arguments: [1e-4, 1000]  # [init_lr, decay_steps]

# Only compute loss on the assistant's response (SAFE/FAIL)
# Not on the system prompt or user message
mask_prompt: true

# Seed for reproducibility
seed: 42

# Logging to Weights & Biases
report_to: wandb
project_name: ccpp-stage1-classifier
