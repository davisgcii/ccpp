# Development Configuration
#
# Optimized for local development with Ollama and faster iteration.
# Extends default.yaml with dev-specific overrides.

# Use local Ollama for both stages
stage1:
  backend: ollama
  model_name: qwen3:1.7b
  timeout: 30

stage2:
  backend: ollama
  model_name: qwen3:1.7b
  timeout: 60

# More aggressive timeouts for faster development iteration
streaming:
  stream_break_timeout_ms: 1000  # 1s for faster testing (still voice-appropriate)
  holdback_buffer_size: 1024  # Reasonable size for dev (still large enough for continuous speech)

# Enable detailed logging for debugging
logging:
  level: DEBUG
  log_decisions: true
  log_latency: true
